spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/launchpad}
    username: ${DB_USERNAME:launchpad}
    password: ${DB_PASSWORD:launchpad}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
  flyway:
    enabled: true
    locations: classpath:db/migration
  
server:
  port: 8080